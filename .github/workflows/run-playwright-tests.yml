name: Playwright Tests
on: [push,pull_request]
jobs:
  test:
    timeout-minutes: 125
    # 5 minutes extra to upload videos if we fail the timeout of one hour, below
    strategy:
      fail-fast: false
      matrix:
        # Rather than running all three browser projects on every OS, we split them up:
        # chromium everywhere, firefox on ubuntu/windows, webkit on macOS (the closest to
        # real Safari). This keeps coverage of each browser engine without a full 3x3 matrix.
        os: [ubuntu-latest, macos-latest, windows-latest]
        # For parallelising the tests:
        playwright_shard: [1, 2, 3]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: volta-cli/action@v4
    - name: Install dependencies
      run: npm ci
    - name: Install Pyodide
      run: npm run build:download-pyodide-libs      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests (Unix)
      if: ${{ matrix.os == 'ubuntu-latest' }}
      shell: bash
      run: |
        jq ".scripts[\"playwright:run\"] = \"npx playwright test --project=chromium --project=firefox --shard=${{ matrix.playwright_shard }}/3\"" package.json > temp.json && mv temp.json package.json
        timeout 7200s npm run test:playwright || { echo "Test command exited or timed out"; exit 1; }
    - name: Run Playwright tests (MacOS)
      if: ${{ matrix.os == 'macos-latest' }}
      shell: bash
      run: |
        brew install coreutils
        brew install --quiet jq
        jq ".scripts[\"playwright:run\"] = \"npx playwright test --project=chromium --project=webkit --shard=${{ matrix.playwright_shard }}/3\"" package.json > temp.json && mv temp.json package.json
        gtimeout 7200s npm run test:playwright || { echo "Test command exited or timed out"; exit 1; }
    - name: Run Playwright tests (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      shell: pwsh
      run: |
        $pkg = Get-Content package.json -Raw | ConvertFrom-Json
        $pkg.scripts.'playwright:run' = 'npx playwright test --project=chromium --project=firefox --shard=${{ matrix.playwright_shard }}/3'
        $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
        npm run test:playwright
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Test command exited with a failure"
          exit 1
        }
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ matrix.os }}-${{matrix.playwright_shard}}
        path: tests/playwright/html-report/
        retention-days: 30
