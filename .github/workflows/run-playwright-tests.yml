name: Playwright Tests
on: [push,pull_request]
jobs:
  test:
    timeout-minutes: 125
    # 5 minutes extra to upload videos if we fail the timeout of one hour, below
    strategy:
      fail-fast: false
      matrix:
        # Rather than running all three browser projects on every OS (or relying on
        # Playwright's shard split lining up with project boundaries, which only worked
        # by coincidence when shard count == project count), each OS+browser pair below
        # is its own job: chromium everywhere, firefox on ubuntu/macOS, webkit on macOS
        # (the closest to real Safari).
        #
        # windows-latest + firefox is deliberately NOT included: it has a recurring,
        # not-yet-root-caused issue where ~30% of runs report "N errors were not a part
        # of any test" / "Worker teardown timeout of 30000ms exceeded" even when every
        # test itself passes (see runs 29241500678, 29255482751) -- Playwright's own
        # worker/browser-process teardown occasionally hangs on this OS+browser
        # combination specifically, unrelated to which spec ran last (the trailing test
        # differs between occurrences). This makes the job fail CI despite the app and
        # tests being fine, so it's disabled here rather than have it cry wolf on every
        # PR. macos-latest + firefox is enabled in its place to keep firefox coverage on
        # a second OS. Re-enable windows+firefox once that teardown issue is root-caused.
        include:
          - os: ubuntu-latest
            browser: chromium
          - os: ubuntu-latest
            browser: firefox
          - os: macos-latest
            browser: chromium
          - os: macos-latest
            browser: firefox
          - os: macos-latest
            browser: webkit
          - os: windows-latest
            browser: chromium
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: volta-cli/action@v4
    - name: Install dependencies
      run: npm ci
    - name: Cache Pyodide
      id: cache-pyodide
      uses: actions/cache@v4
      with:
        path: public/pyodide
        key: ${{ runner.os }}-pyodide-${{ hashFiles('package-lock.json') }}
    - name: Install Pyodide
      if: steps.cache-pyodide.outputs.cache-hit != 'true'
      run: npm run build:download-pyodide-libs
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests (Unix)
      if: ${{ matrix.os == 'ubuntu-latest' }}
      shell: bash
      run: |
        jq ".scripts[\"playwright:run\"] = \"npx playwright test --project=${{ matrix.browser }}\"" package.json > temp.json && mv temp.json package.json
        timeout 7200s npm run test:playwright || { echo "Test command exited or timed out"; exit 1; }
    - name: Run Playwright tests (MacOS)
      if: ${{ matrix.os == 'macos-latest' }}
      shell: bash
      run: |
        brew install coreutils
        brew install --quiet jq
        if [ "${{ matrix.browser }}" = "webkit" ]; then
          # console-execution.spec.ts and storage-model.spec.ts have both shown CI-only
          # stop-slowness/flakiness on macOS+WebKit, suspected to be main-thread starvation
          # caused by this job's normal multi-worker parallelism (see
          # docs/claude-improve-testing/WEBKIT_STOP_INVESTIGATION.md). Run them alone first,
          # single-worker, before the rest of the suite, to test that directly.
          ISOLATED_SPECS="tests/playwright/e2e/console-execution.spec.ts,tests/playwright/e2e/storage-model.spec.ts"
          RUN_CMD="SPEC=$ISOLATED_SPECS npx playwright test --project=webkit --workers=1 && EXCLUDE_SPEC=$ISOLATED_SPECS npx playwright test --project=webkit"
        else
          RUN_CMD="npx playwright test --project=${{ matrix.browser }}"
        fi
        jq --arg cmd "$RUN_CMD" '.scripts["playwright:run"] = $cmd' package.json > temp.json && mv temp.json package.json
        gtimeout 7200s npm run test:playwright || { echo "Test command exited or timed out"; exit 1; }
    - name: Run Playwright tests (Windows)
      if: ${{ matrix.os == 'windows-latest' }}
      shell: pwsh
      run: |
        $pkg = Get-Content package.json -Raw | ConvertFrom-Json
        $pkg.scripts.'playwright:run' = 'npx playwright test --project=${{ matrix.browser }}'
        $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
        npm run test:playwright
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Test command exited with a failure"
          exit 1
        }
    - name: Expand failed/flaky sections in job summary
      if: always()
      shell: bash
      run: |
        node -e '
          const fs = require("fs");
          const path = process.env.GITHUB_STEP_SUMMARY;
          if (path && fs.existsSync(path)) {
            const content = fs.readFileSync(path, "utf-8");
            const updated = content.replace(/<details><summary>(❌|⚠️)/g, "<details open><summary>$1");
            fs.writeFileSync(path, updated, "utf-8");
          }
        '
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report-${{ matrix.os }}-${{ matrix.browser }}
        path: tests/playwright/html-report/
        retention-days: 30
